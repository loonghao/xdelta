# Unified build configuration file
# Used for consistent configuration between local and CI environments

# vcpkg configuration
vcpkg:
  commit: "a34c873a9717a888f58dc05268dea15592c2f0ff"
  max_concurrency: 2
  environment_vars:
    - "HTTP_PROXY"
    - "HTTPS_PROXY"
    - "http_proxy"
    - "https_proxy"

# Build configuration
build:
  default_type: "Release"
  parallel_jobs: 2
  cmake_options:
    common:
      - "-DXDELTA_ENABLE_LZMA=ON"
      - "-DXDELTA_BUILD_TESTS=OFF"
      - "-DCMAKE_VERBOSE_MAKEFILE=ON"
    windows:
      - "-DCMAKE_C_COMPILER_LAUNCHER=ccache"
      - "-DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
    linux:
      - "-DCMAKE_C_COMPILER_LAUNCHER=ccache"
      - "-DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
      - "-DCMAKE_DISABLE_FIND_PACKAGE_LibLZMA=OFF"

# Platform configuration
platforms:
  windows:
    architectures:
      x64:
        triplet: "x64-windows"
        cmake_arch: "-A x64"
      x86:
        triplet: "x86-windows"
        cmake_arch: "-A Win32"
  linux:
    architectures:
      x64:
        triplet: "x64-linux"
        cmake_arch: ""

# Cache configuration
cache:
  ccache:
    key_pattern: "{os}-{arch}-ccache-{hash}"
    restore_keys_pattern: "{os}-{arch}-ccache-"
  cmake:
    key_pattern: "{os}-{arch}-cmake-{hash}"
    restore_keys_pattern: "{os}-{arch}-cmake-"
    paths:
      - "build/CMakeCache.txt"
      - "build/CMakeFiles"
      - "build/*.cmake"
  vcpkg:
    key_pattern: "vcpkg-{os}-{triplet}-{hash}"

# Retry configuration
retry:
  max_attempts: 3
  delay_seconds: 30

# Artifact configuration
artifacts:
  retention_days:
    pr: 1
    release: 90
  windows:
    executable_path: "build/{build_type}/xdelta3.exe"
    library_path: "build/{build_type}/xdelta.lib"
  linux:
    executable_path: "build/xdelta3"
    library_path: "build/libxdelta.a"

# Package configuration
packaging:
  # Package types and their configurations
  types:
    binary:
      description: "Binary distribution package"
      include_readme: true
      include_dependencies: true
      archive_formats:
        windows: "zip"
        linux: "tar.gz"
    vcpkg:
      description: "vcpkg registry package"
      include_headers: true
      include_libraries: true
      include_binaries: true
      structure: "vcpkg-layout"
      archive_formats:
        windows: "zip"
    test:
      description: "Test package for PR validation"
      minimal: true
      architectures: ["x64"]
      include_readme: false

  # Package structure templates
  structures:
    binary:
      windows:
        - "xdelta3.exe"
        - "*.dll"
        - "README.txt"
      linux:
        - "xdelta3"
        - "README.txt"
    vcpkg-layout:
      windows:
        - "{version}/x64-windows/bin/xdelta3.exe"
        - "{version}/x64-windows/lib/*.lib"
        - "{version}/x64-windows/include/xdelta3/*.h"
        - "{version}/x86-windows/bin/xdelta3.exe"
        - "{version}/x86-windows/lib/*.lib"
        - "{version}/x86-windows/include/xdelta3/*.h"
        - "{version}/README.md"
        - "{version}/usage.md"

  # Archive naming patterns
  naming:
    binary: "xdelta3-{os}-{arch}"
    vcpkg: "xdelta-{version}-windows"
    test: "xdelta3-{os}-{arch}-test"

  # Dependencies to include
  dependencies:
    windows:
      required:
        - "liblzma.dll"
      optional:
        - "zlib.dll"
        - "bzip2.dll"
    linux:
      required: []
      optional: []
